# Brand configuration for WeChat Article Illustrator
# Copy this file to config.yaml and customize for your own public account.

backend: api

api:
  # Supported providers: grsai / openai / openai-compatible / local
  provider: openai
  base_url: https://api.openai.com
  api_key: ""  # Your API key
  model: gpt-image-2

brand:
  enabled: true              # Master switch — set false to disable ALL brand watermarks
  default: "luoboa"         # Default brand when type_routing doesn't match

  # Multi-brand profile system.
  # Each profile is a complete brand identity (name + tagline + optional logo + handle).
  # 文章类型 → brand 的自动路由在 type_routing 段配置。
  #
  # 字段说明：
  #   name     — 品牌名（公众号名）
  #   tagline  — 简短理念/签名（如"听见自己"）
  #   logo_url — 图片 logo URL（可选；留空则只显示文字水印）
  #   handle   — 账号标识。可以是微信号（如 mumianshujian）/ 网址（如 luoboa.com）/
  #             Twitter handle / 任何平台 ID。**不要自动加 .com 后缀**。
  profiles:
    luoboa:
      name: "萝卜啊"            # 科技/职场/成长/观点/知乎/微头条用这个
      tagline: "AI落地实践者"
      logo_url: null
      handle: "luoboa.com"        # 网址

    mumian:
      name: "木棉书笺"          # 情感/夜听/日听/微小说用这个
      tagline: "听见自己"
      logo_url: null
      handle: "mumianshujian"     # 微信号（不加 .com）

  # 按文章类型自动路由 brand。
  # 调用 generate.py 时传 --article-type=xxx，会自动用对应 brand。
  # 显式传 --brand=name 可覆盖自动路由。
  type_routing:
    # 情感类 → 木棉书笺
    healing: mumian
    yeting:  mumian
    riting:  mumian
    fiction: mumian
    # 工具/观点类 → 萝卜啊
    tech:     luoboa
    career:   luoboa
    growth:   luoboa
    profile:  luoboa
    opinion:  luoboa
    zhihu:    luoboa
    toutiao:  luoboa

# Jimeng CLI settings (for Workflow D: 快文配图)
# cli_path: leave empty to auto-detect, or set to jimeng-cli-free repo path
jimeng:
  enabled: false
  cli_path: ""
  model: high_aes_general_v50
  aspect: "9:16"

# Dreamina CLI settings (for cover/section workflows and Workflow N: 头条配图)
# cli_path: leave empty to auto-detect from PATH (uses `dreamina` command)
dreamina:
  enabled: true
  cli_path: ""              # auto-detected from PATH
  ratio_cover: "21:9"
  ratio_section: "1:1"
  resolution: "2k"
  poll_timeout: 60

# News headline illustrator (Workflow N)
# Generates 9:16 colored pencil sketch illustrations for each news item.
# Note: dreamina text2image does NOT support --ref-url, so cross-image style
# consistency is enforced via heavy prompt keywords (see references/news-styles.md).
news:
  ratio: "9:16"             # 9:16 vertical poster
  resolution: "2k"          # 1k/2k/4k (model-dependent)
  poll_timeout: 120         # seconds to wait for first poll
  model: "high_aes_general_v50"  # default model if --model_version omitted
  ref_url_from_previous: false  # NOT supported by dreamina text2image; kept for future use
